<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>EP3 · S1 · Default State — Interactive</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1440px; height: 900px; overflow: hidden; background: #000; }

.screen {
  position: relative;
  width: 1440px;
  height: 900px;
}
.screen > img {
  position: absolute;
  top: 0; left: 0;
  width: 1440px; height: 900px;
  display: block;
  pointer-events: none;
  user-select: none;
}

/* Hotspot = прозрачная кликабельная зона поверх PNG */
.hs {
  position: absolute;
  cursor: pointer;
}
.hs:hover {
  background: rgba(255, 255, 255, 0.07);
  border-radius: 3px;
  outline: 1px solid rgba(91, 189, 224, 0.4);
}

/* State navigator */
.state-nav {
  position: fixed;
  bottom: 10px; right: 10px;
  background: rgba(10, 24, 38, 0.9);
  border-radius: 6px;
  padding: 7px 12px;
  z-index: 999;
  color: #fff;
  font: 10.5px/1.5 'Segoe UI', sans-serif;
}
.state-nav a {
  color: #7de0f8;
  margin: 0 4px;
  text-decoration: none;
  cursor: pointer;
}
.state-nav a:hover { color: #fff; text-decoration: underline; }
.state-nav strong { color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
<div class="screen">

  <!-- Pixel-perfect PNG из Figma -->
