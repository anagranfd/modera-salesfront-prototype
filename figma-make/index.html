
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=1440">
      <title>EP1 · A1 · Idle — Modera</title>
      <script type="module" crossorigin src="./assets/index-DCNS8_wU.js"></script>
      <link rel="stylesheet" crossorigin href="./assets/index-Dfdu9uyU.css">
      <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
          margin: 0; padding: 0;
          width: 100vw; height: 100vh;
          overflow: hidden;
          background: #000;
        }
        #root {
          width: 1440px;
          height: 900px;
          overflow: hidden;
          position: absolute;
          top: 0; left: 0;
          transform-origin: top left;
        }
      </style>
      <script>
        function fitScreen() {
          var root = document.getElementById('root');
          if (!root) return;
          var sx = window.innerWidth  / 1440;
          var sy = window.innerHeight / 900;
          var s  = Math.min(sx, sy);
          var ox = (window.innerWidth  - 1440 * s) / 2;
          var oy = (window.innerHeight - 900  * s) / 2;
          root.style.transform = 'translate(' + ox + 'px,' + oy + 'px) scale(' + s + ')';
        }
        window.addEventListener('resize', fitScreen);
        window.addEventListener('DOMContentLoaded', fitScreen);
      </script>
    </head>

    <body>
      <div id="root"></div>
    </body>
  </html>
