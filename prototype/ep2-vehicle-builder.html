<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>EP2 — Vehicle Builder · Publishing Panel — Modera Salesfront</title>
<link rel="stylesheet" href="shared/tokens.css">
<link rel="stylesheet" href="shared/components.css">
<link rel="stylesheet" href="shared/animations.css">
<style>
html, body { height:100%; overflow:hidden; }
.builder-layout { display:flex; flex:1; overflow:hidden; }
.builder-form-col { flex:1; overflow-y:auto; padding:12px; background:var(--content-bg); border-right:1px solid var(--border); }
.builder-panel-col { width:var(--panel-sidebar-width); flex-shrink:0; overflow-y:auto; padding:10px; background:var(--page-bg); }
.builder-tabs { display:flex; background:linear-gradient(180deg,#ddeef7,#c8dce8); border-bottom:1px solid var(--border-dark); flex-shrink:0; }
.builder-tab { font-size:11.5px; font-weight:600; padding:5px 14px; cursor:pointer; color:var(--text-muted); border-right:1px solid rgba(0,0,0,0.08); border-bottom:2px solid transparent; margin-bottom:-1px; }
.builder-tab:hover { background:rgba(255,255,255,0.4); color:var(--text-main); }
.builder-tab--active { background:#fff; color:var(--text-main); border-bottom:2px solid #5aaed0; }
.builder-section { background:#fff; border:1px solid var(--border); border-radius:3px; margin-bottom:10px; }
.builder-section__head { background:linear-gradient(180deg,#eef6fb,#e0edf5); padding:6px 10px; border-bottom:1px solid var(--border); font-size:11.5px; font-weight:700; color:var(--text-main); }
.builder-section__body { padding:10px; }
.field-hint--error { font-size:10px; color:var(--status-err); margin-top:2px; display:flex; align-items:center; gap:3px; }
.field-hint--ok { font-size:10px; color:var(--status-pub); margin-top:2px; display:flex; align-items:center; gap:3px; }
.realtime-badge { font-size:10px; padding:1px 5px; border-radius:2px; margin-left:4px; }
.realtime-badge--updating { background:#fef3d4; color:#b07820; border:1px solid #e8d090; }
.realtime-badge--ok { background:#d4f0da; color:#2d8a4e; border:1px solid #a4d8b4; animation:fieldResolved 1.5s ease forwards; }
.ep2-state-nav { position:fixed; bottom:10px; left:10px; background:rgba(20,40,60,0.85); border-radius:6px; padding:8px 12px; z-index:300; color:#fff; font-size:10.5px; }
.ep2-state-nav a { color:#7de0f8; margin:0 4px; text-decoration:none; }
.ep2-state-nav a:hover { color:#fff; text-decoration:underline; }
.builder-banner { background:linear-gradient(180deg,#fff3cd,#feeaa0); border:1px solid #e0c060; padding:7px 10px; font-size:11.5px; color:#7a5010; display:flex; align-items:center; gap:7px; flex-shrink:0; }
.panel-here-indicator { font-size:10px; color:#5aaed0; font-style:italic; padding:2px 6px; background:#eef6fb; border-radius:2px; border:1px solid #c8e2ef; }
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;height:100vh;">

  <!-- Top nav -->
  <div class="modera-topnav">
    <div class="modera-topnav__logo">MODERA</div>
    <div class="modera-topnav__module">Salesfront</div>
    <div style="color:rgba(255,255,255,0.5);padding:0 8px;display:flex;align-items:center;font-size:11px;">›</div>
    <div style="color:rgba(255,255,255,0.9);font-size:11.5px;display:flex;align-items:center;font-weight:600;">Vehicle Builder — VW Golf 1.6 TDI (ABC-123)</div>
    <div class="modera-topnav__right">
      <span class="pub-status-pill pub-status-pill--idle" id="pub-status-pill">Publishing</span>
      <span class="topnav-icon">🔔</span>
      <span class="topnav-username">J. Tamm ▾</span>
    </div>
  </div>
  <div class="modera-subnav">
    <a class="subnav-tab" href="ep3-inventory-pipeline.html">← Inventory</a>
    <a class="subnav-tab" href="ep1-vehicle-card.html">Vehicle Card</a>
    <a class="subnav-tab subnav-tab--active">Builder</a>
  </div>

  <!-- Banner (shown in b3/a2 states) -->
  <div class="builder-banner" id="builder-banner" style="display:none;">
    <svg width="14" height="14" viewBox="0 0 12 12" style="flex-shrink:0;"><path d="M6 1.5L11 10H1L6 1.5Z" fill="none" stroke="#b07820" stroke-width="1.3" stroke-linejoin="round"/><path d="M6 4.5v2.5M6 8.5v.5" stroke="#b07820" stroke-width="1.3" stroke-linecap="round"/></svg>
    <span id="builder-banner-text">Complete these fields to publish on Mobile.de</span>
    <div style="flex:1;"></div>
    <button class="jq-btn jq-btn--sm" onclick="setState('b1')">← Back to Publishing</button>
  </div>

  <!-- Main layout -->
  <div class="builder-layout">

    <!-- Left: form -->
    <div style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div class="builder-tabs">
        <div class="builder-tab builder-tab--active" id="btab-basic" onclick="switchBuilderTab('basic')">Basic Info</div>
        <div class="builder-tab" id="btab-details" onclick="switchBuilderTab('details')">Details</div>
        <div class="builder-tab" id="btab-media" onclick="switchBuilderTab('media')">Media</div>
        <div class="builder-tab" id="btab-pricing" onclick="switchBuilderTab('pricing')">Pricing</div>
        <div class="builder-tab" id="btab-extras" onclick="switchBuilderTab('extras')">Extras</div>
      </div>
      <div class="builder-form-col" id="builder-form-content">
        <!-- Filled by switchBuilderTab -->
      </div>
    </div>

    <!-- Right: publishing panel -->
    <div class="builder-panel-col">
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;">Publishing</div>
      <div id="pub-panel-container">
        <!-- filled by publishing-panel.js -->
      </div>
      <div style="margin-top:8px;font-size:10.5px;color:#5a7080;text-align:center;">
        <a class="link" href="ep1-vehicle-card.html" target="_blank">← Vehicle Card</a>
        · <a class="link" href="ep3-inventory-pipeline.html" target="_blank">Inventory</a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div style="background:linear-gradient(180deg,#f0f6fa,#e4edf5);border-top:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;">
    <button class="jq-btn" onclick="history.back()">← Cancel</button>
    <div style="flex:1;"></div>
    <span style="font-size:10.5px;color:#5a7080;" id="autosave-label">All changes saved</span>
    <button class="jq-btn jq-btn--primary" id="save-btn" onclick="simulateSave()">
      <svg width="11" height="11" viewBox="0 0 11 11"><path d="M2 2h6l1 1v6H2V2zm2 6V6h2v2H4zm1-6v3H3V2h2z" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      Save changes
    </button>
  </div>
</div>

<!-- State nav -->
<div class="ep2-state-nav">
  <strong>EP2:</strong>
  <a href="#a1">A1</a><a href="#a2">A2</a><a href="#a3">A3</a><a href="#a4">A4</a><a href="#a5">A5</a><a href="#a6">A6</a>
  · <a href="ep1-vehicle-card.html">EP1</a>
  · <a href="ep3-inventory-pipeline.html">EP3</a>
</div>

<script src="shared/icons.js"></script>
<script src="shared/publishing-panel.js"></script>
<script>
// ─── EP2 Builder form content ────────────────────────────────────────────────
const builderForms = {
  basic: () => `
    <div class="builder-section">
      <div class="builder-section__head">Vehicle identification</div>
      <div class="builder-section__body">
        <div class="form-row form-row--3col">
          <div class="form-row">
            <label class="jq-label">Make *</label>
            <input class="jq-input" value="Volkswagen">
          </div>
          <div class="form-row">
            <label class="jq-label">Model *</label>
            <input class="jq-input" value="Golf">
          </div>
          <div class="form-row">
            <label class="jq-label">Modification</label>
            <input class="jq-input" value="1.6 TDI">
          </div>
        </div>
        <div class="form-row form-row--3col">
          <div class="form-row">
            <label class="jq-label">Year *</label>
            <input class="jq-input" value="2019" type="number">
          </div>
          <div class="form-row">
            <label class="jq-label">Reg. number</label>
            <input class="jq-input" value="ABC-123">
          </div>
          <div class="form-row">
            <label class="jq-label">VIN</label>
            <input class="jq-input" value="WVWZZZ1KZ...">
          </div>
        </div>
      </div>
    </div>
    <div class="builder-section">
      <div class="builder-section__head">Technical data</div>
      <div class="builder-section__body">
        <div class="form-row form-row--3col">
          <div class="form-row" id="field-mileage-wrap">
            <label class="jq-label" id="mileage-label">Mileage (km) *</label>
            <input class="jq-input" id="mileage-input" value="78200" type="number" oninput="onMileageChange(this.value)" onblur="onMileageBlur(this.value)">
            <div class="field-hint--ok" id="mileage-hint" style="display:none;">✓ Saved</div>
            <div class="field-hint--error" id="mileage-error" style="display:none;">Required by Mobile.de</div>
          </div>
          <div class="form-row" id="field-fuel-wrap">
            <label class="jq-label" id="fuel-label">Fuel type *</label>
            <select class="jq-select" id="fuel-select" onchange="onFuelChange(this.value)">
              <option value="">Select…</option>
              <option selected>Diesel</option>
              <option>Petrol</option>
              <option>Hybrid</option>
              <option>Electric</option>
            </select>
            <div class="field-hint--error" id="fuel-error" style="display:none;">Required by Mobile.de</div>
          </div>
          <div class="form-row">
            <label class="jq-label">Engine (cc)</label>
            <input class="jq-input" value="1598" type="number">
          </div>
        </div>
        <div class="form-row form-row--3col">
          <div class="form-row">
            <label class="jq-label">Power (hp)</label>
            <input class="jq-input" value="115" type="number">
          </div>
          <div class="form-row">
            <label class="jq-label">Transmission</label>
            <select class="jq-select"><option>Manual</option><option>Automatic</option><option>DSG</option></select>
          </div>
          <div class="form-row">
            <label class="jq-label">Drive</label>
            <select class="jq-select"><option>FWD</option><option>RWD</option><option>AWD</option></select>
          </div>
        </div>
        <div class="form-row form-row--2col">
          <div class="form-row">
            <label class="jq-label">Body type</label>
            <select class="jq-select"><option>Hatchback</option><option>Sedan</option><option>Estate</option></select>
          </div>
          <div class="form-row">
            <label class="jq-label">Color</label>
            <input class="jq-input" value="Deep Black Pearl">
          </div>
        </div>
      </div>
    </div>`,

  details: () => `
    <div class="builder-section">
      <div class="builder-section__head">Additional details</div>
      <div class="builder-section__body">
        <div class="form-row form-row--3col">
          <div class="form-row" id="field-interior-wrap">
            <label class="jq-label" id="interior-label">Interior color</label>
            <input class="jq-input" id="interior-input" value="" placeholder="e.g. Black leather">
            <div class="field-hint--error" id="interior-error" style="display:none;">Required by Autoplius</div>
          </div>
          <div class="form-row" id="field-doors-wrap">
            <label class="jq-label" id="doors-label">Doors count</label>
            <select class="jq-select" id="doors-select">
              <option value="">Select…</option>
              <option>2</option><option>3</option><option selected>4</option><option>5</option>
            </select>
            <div class="field-hint--error" id="doors-error" style="display:none;">Required by Autoplius</div>
          </div>
          <div class="form-row">
            <label class="jq-label">Seats</label>
            <input class="jq-input" value="5" type="number">
          </div>
        </div>
        <div class="form-row form-row--2col">
          <div class="form-row">
            <label class="jq-label">CO2 emissions</label>
            <input class="jq-input" value="119" type="number">
          </div>
          <div class="form-row">
            <label class="jq-label">Fuel consumption (l/100km)</label>
            <input class="jq-input" value="4.5" type="number" step="0.1">
          </div>
        </div>
        <div class="form-row">
          <label class="jq-label">Description</label>
          <textarea class="jq-textarea" style="height:80px;">Well-maintained one-owner vehicle. Full service history. Non-smoker. Recent MOT.</textarea>
        </div>
      </div>
    </div>`,

  media: () => `
    <div class="builder-section">
      <div class="builder-section__head">Photos &amp; Media</div>
      <div class="builder-section__body">
        <div style="background:#f4f8fb;border:2px dashed var(--border);border-radius:4px;padding:30px;text-align:center;color:#5a7080;font-size:11.5px;">
          <div style="font-size:28px;margin-bottom:8px;">📷</div>
          <div style="font-weight:600;margin-bottom:4px;">Drag photos here or click to upload</div>
          <div style="font-size:10.5px;">JPEG, PNG · max 10MB per file · up to 40 photos</div>
          <button class="jq-btn jq-btn--sm" style="margin-top:10px;">Upload photos</button>
        </div>
      </div>
    </div>`,

  pricing: () => `
    <div class="builder-section">
      <div class="builder-section__head">Pricing</div>
      <div class="builder-section__body">
        <div class="form-row form-row--3col">
          <div class="form-row">
            <label class="jq-label">Sale price (€) *</label>
            <input class="jq-input" value="14500" type="number">
          </div>
          <div class="form-row">
            <label class="jq-label">VAT type</label>
            <select class="jq-select"><option>Incl. VAT</option><option>Excl. VAT</option><option>No VAT</option></select>
          </div>
          <div class="form-row">
            <label class="jq-label">Currency</label>
            <select class="jq-select"><option>EUR</option><option>USD</option></select>
          </div>
        </div>
        <div class="form-row form-row--2col">
          <div class="form-row">
            <label class="jq-label">Original price (€)</label>
            <input class="jq-input" value="16200" type="number">
          </div>
          <div class="form-row">
            <label class="jq-label">Leasing available</label>
            <select class="jq-select"><option>Yes</option><option>No</option></select>
          </div>
        </div>
      </div>
    </div>`,

  extras: () => `
    <div class="builder-section">
      <div class="builder-section__head">Equipment &amp; Extras</div>
      <div class="builder-section__body">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;font-size:11.5px;">
          ${['Air conditioning','Cruise control','Parking sensors','Heated seats','Navigation system','Bluetooth','Sunroof','Leather seats','Backup camera','Alloy wheels','LED lights','Keyless entry'].map(e=>`
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer;padding:3px;">
            <input type="checkbox" class="jq-check" checked> ${e}
          </label>`).join('')}
        </div>
      </div>
    </div>`
};

// Current builder state
let ep2State = 'a1';
let currentBuilderTab = 'basic';
let mileageTimeout = null;
let panelUpdatePhase = 0; // 0=no update, 1=updating, 2=done

function switchBuilderTab(tab) {
  currentBuilderTab = tab;
  document.querySelectorAll('.builder-tab').forEach(t => t.classList.remove('builder-tab--active'));
  const tabEl = document.getElementById('btab-' + tab);
  if (tabEl) tabEl.classList.add('builder-tab--active');

  const content = document.getElementById('builder-form-content');
  if (content && builderForms[tab]) {
    content.innerHTML = builderForms[tab]();
    applyFieldHighlights();
  }
}

function applyFieldHighlights() {
  if (ep2State === 'a2' || ep2State === 'a3') {
    // Mileage and fuel highlighted (only on basic tab)
    if (currentBuilderTab === 'basic') {
      const milInput = document.getElementById('mileage-input');
      const fuelSel = document.getElementById('fuel-select');
      const milError = document.getElementById('mileage-error');
      const fuelError = document.getElementById('fuel-error');
      const milLabel = document.getElementById('mileage-label');
      const fuelLabel = document.getElementById('fuel-label');

      if (ep2State === 'a2') {
        if (milInput) { milInput.classList.add('builder-form__field--highlighted'); milInput.value = ''; }
        if (fuelSel)  { fuelSel.classList.add('builder-form__field--highlighted'); fuelSel.value = ''; }
        if (milError) milError.style.display = 'flex';
        if (fuelError) fuelError.style.display = 'flex';
        if (milLabel) milLabel.style.color = '#b03030';
        if (fuelLabel) fuelLabel.style.color = '#b03030';
      } else if (ep2State === 'a3') {
        // mileage filled, still updating
        if (milInput) { milInput.classList.remove('builder-form__field--highlighted'); milInput.value = '78200'; }
        if (fuelSel)  { fuelSel.classList.add('builder-form__field--highlighted'); fuelSel.value = ''; }
        if (fuelError) fuelError.style.display = 'flex';
        if (fuelLabel) fuelLabel.style.color = '#b03030';
      }
    }
    if (currentBuilderTab === 'details' && ep2State === 'a5') {
      const interiorInput = document.getElementById('interior-input');
      const doorsSelect = document.getElementById('doors-select');
      const interiorError = document.getElementById('interior-error');
      const doorsError = document.getElementById('doors-error');
      const interiorLabel = document.getElementById('interior-label');
      const doorsLabel = document.getElementById('doors-label');
      if (interiorInput) { interiorInput.classList.add('builder-form__field--highlighted'); }
      if (doorsSelect) { doorsSelect.classList.add('builder-form__field--highlighted'); doorsSelect.value = ''; }
      if (interiorError) interiorError.style.display = 'flex';
      if (doorsError) doorsError.style.display = 'flex';
      if (interiorLabel) interiorLabel.style.color = '#b03030';
      if (doorsLabel) doorsLabel.style.color = '#b03030';
    }
  }
}

function onMileageChange(val) {
  const milInput = document.getElementById('mileage-input');
  const milError = document.getElementById('mileage-error');
  const milHint = document.getElementById('mileage-hint');
  if (!milInput) return;

  milInput.classList.remove('builder-form__field--highlighted');
  if (milError) milError.style.display = 'none';

  const autosave = document.getElementById('autosave-label');
  if (autosave) autosave.textContent = 'Saving…';

  clearTimeout(mileageTimeout);
  mileageTimeout = setTimeout(() => {
    if (val && parseInt(val) > 0) {
      if (milHint) milHint.style.display = 'flex';
      if (autosave) autosave.textContent = 'All changes saved';
      // Update panel to a3 style
      if (ep2State === 'a2') {
        ep2State = 'a3';
        refreshPubPanel();
      }
    }
  }, 800);
}

function onMileageBlur(val) { onMileageChange(val); }

function onFuelChange(val) {
  const fuelSel = document.getElementById('fuel-select');
  const fuelError = document.getElementById('fuel-error');
  if (!fuelSel) return;
  if (val) {
    fuelSel.classList.remove('builder-form__field--highlighted');
    if (fuelError) fuelError.style.display = 'none';
    const fuelLabel = document.getElementById('fuel-label');
    if (fuelLabel) fuelLabel.style.color = '';
    if (ep2State === 'a3') {
      ep2State = 'a4';
      refreshPubPanel();
    }
  }
}

function refreshPubPanel() {
  const container = document.getElementById('pub-panel-container');
  if (!container) return;
  const renderers = {
    a1: renderEP2PanelA1,
    a2: renderEP2PanelA2,
    a3: renderEP2PanelA3,
    a4: renderEP2PanelA4,
    a5: renderEP2PanelA5,
    a6: renderEP2PanelA6,
    b1: (c) => STATE_RENDERERS.b1(c),
    b2: (c) => STATE_RENDERERS.b2(c),
    b3: renderEP2PanelB3,
    b4: (c) => STATE_RENDERERS.b4(c),
    c1: (c) => STATE_RENDERERS.c1(c),
    c2: (c) => STATE_RENDERERS.c2(c),
    c3: (c) => STATE_RENDERERS.c3(c),
    c4: (c) => STATE_RENDERERS.c4(c),
  };
  if (renderers[ep2State]) renderers[ep2State](container);
  history.replaceState(null, '', '#' + ep2State);

  // Update topnav pill
  updateStatusPill(ep2State);

  // Show/hide banner
  const banner = document.getElementById('builder-banner');
  const bannerText = document.getElementById('builder-banner-text');
  if (banner) {
    if (ep2State === 'a2' || ep2State === 'a3' || ep2State === 'b3') {
      banner.style.display = 'flex';
      if (bannerText) {
        if (ep2State === 'a2') bannerText.textContent = 'Complete these fields to publish on Mobile.de';
        else if (ep2State === 'a3') bannerText.textContent = '1 field remaining for Mobile.de';
        else bannerText.textContent = 'Complete these fields to publish on Mobile.de';
      }
    } else {
      banner.style.display = 'none';
    }
  }
}

// EP2-specific panel renderers
function renderEP2PanelA1(container) {
  // Same as EP1 A1 but compact
  STATE_RENDERERS.a1(container);
  // Override the publish button
  const footer = container.querySelector('.pub-panel__footer');
  if (footer) {
    footer.innerHTML = `<button class="jq-btn jq-btn--primary" onclick="startEP2Publish()">
      <svg width="13" height="13" viewBox="0 0 13 13"><path d="M6.5 1v8M3.5 3.5l3-2.5 3 2.5M2 10h9v2H2z" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Publish to channels
    </button>`;
  }
}

function renderEP2PanelA2(container) {
  container.innerHTML = `
    <div class="pub-panel">
      <div class="pub-panel__header">
        <div class="pub-panel__title" style="color:#b07820;">⚠ Validation warnings</div>
      </div>
      <div class="pub-panel__body">
        <div style="font-size:10.5px;color:#5a7080;margin-bottom:8px;">Fields highlighted in the form below:</div>
        ${[
          { name:'Auto24',    pct:96,  st:'good',  msg:'✓ Ready' },
          { name:'Mobile.de', pct:88,  st:'warn',  msg:'⚠ 2 missing', detail:'Mileage, Fuel type' },
          { name:'SS.lv',     pct:74,  st:'good',  msg:'✓ Accepts partial' },
          { name:'Autoplius', pct:88,  st:'warn',  msg:'⚠ 2 missing', detail:'Interior color, Doors count',
            tabLink: 'details' },
        ].map(ch => `
        <div class="ch-row">
          <span class="ch-dot ch-dot--${ch.st==='warn'?'pending':'published'}"></span>
          <div>
            <div class="ch-name">${ch.name}</div>
            <div style="display:flex;align-items:center;gap:4px;margin-top:2px;">
              <div class="val-bar" style="width:70px;"><div class="val-bar__fill val-bar__fill--${ch.st}" style="width:${ch.pct}%"></div></div>
              <span style="font-size:10px;color:#7a9aaa;">${ch.pct}%</span>
            </div>

function renderEP2PanelA6(container) {
  // Publishing in progress — reuse a4 with save disabled
  const savBtn = document.getElementById('save-btn');
  if (savBtn) savBtn.disabled = true;
  const autosave = document.getElementById('autosave-label');
  if (autosave) autosave.textContent = 'Publishing…';

  container.innerHTML = `
    <div class="pub-panel">
      <div class="pub-panel__header">
        <span class="pub-panel__title"><span class="spin" style="display:inline-block;margin-right:5px;">⟳</span>Publishing…</span>
      </div>
      <div class="pub-panel__body">
        <div style="margin-bottom:8px;">
          <div class="overall-progress" id="ep2-progress"><div class="overall-progress__fill" id="ep2-fill" style="width:0%"></div></div>
        </div>
        <div id="ep2-ch-rows">
          ${['Auto24','Mobile.de','SS.lv'].map(n=>`
          <div class="ch-row">
            <span class="ch-dot ch-dot--unpublished" id="dot-${n.replace('.','').replace(' ','')}"></span>
            <div>
              <div class="ch-name">${n}</div>
              <div class="ch-status-text ch-status-text--unpub" id="txt-${n.replace('.','').replace(' ','')}">Waiting…</div>
            </div>
          </div>`).join('')}
        </div>
      </div>
      <div class="pub-panel__footer">
        <button class="jq-btn jq-btn--disabled" disabled>Publishing…</button>
      </div>
    </div>`;

  // Simulate progress
  const chans = ['Auto24','Mobile.de','SS.lv'];
  let step = 0;
  const interval = setInterval(() => {
    const fill = document.getElementById('ep2-fill');
    if (step < chans.length) {
      if (step > 0) {
        const prev = chans[step-1].replace('.','').replace(' ','');
        const dot = document.getElementById('dot-' + prev);
        const txt = document.getElementById('txt-' + prev);
        if (dot) { dot.className = 'ch-dot ch-dot--published'; }
        if (txt) { txt.textContent = '✓ Published'; txt.className = 'ch-status-text ch-status-text--pub'; }
      }
      const cur = chans[step].replace('.','').replace(' ','');
      const dot = document.getElementById('dot-' + cur);
      const txt = document.getElementById('txt-' + cur);
      if (dot) dot.className = 'ch-dot ch-dot--pending dot-pulse';
      if (txt) { txt.textContent = '⟳ Sending…'; txt.className = 'ch-status-text ch-status-text--pend'; }
      if (fill) fill.style.width = Math.round((step / chans.length) * 100) + '%';
      step++;
    } else {
      if (chans.length > 0) {
        const last = chans[chans.length-1].replace('.','').replace(' ','');
        const dot = document.getElementById('dot-' + last);
        const txt = document.getElementById('txt-' + last);
        if (dot) dot.className = 'ch-dot ch-dot--published';
        if (txt) { txt.textContent = '✓ Published'; txt.className = 'ch-status-text ch-status-text--pub'; }
      }
      if (fill) fill.style.width = '100%';
      clearInterval(interval);
      const savBtn = document.getElementById('save-btn');
      if (savBtn) savBtn.disabled = false;
      const autosave = document.getElementById('autosave-label');
      if (autosave) autosave.textContent = 'All changes saved';
      setTimeout(() => { ep2State = 'a5'; STATE_RENDERERS.a5(container); }, 600);
    }
  }, 800);
}

// Override initPubPanel for EP2
window.initPubPanel = function() {
  const hash = location.hash.slice(1).toLowerCase();
  const ep2States = ['a1','a2','a3','a4','a5','a6','b1','b2','b3','b4','c1','c2','c3','c4'];
  ep2State = ep2States.includes(hash) ? hash : 'a1';
  refreshPubPanel();
  if (['a2','a5'].includes(ep2State)) applyFieldHighlights();
  if (ep2State === 'a5') {
    switchBuilderTab('details');
    applyFieldHighlights();
  }
};

window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1).toLowerCase();
  const ep2States = ['a1','a2','a3','a4','a5','a6','b1','b2','b3','b4','c1','c2','c3','c4'];
  if (ep2States.includes(hash)) {
    ep2State = hash;
    refreshPubPanel();
    if (hash === 'a5') { switchBuilderTab('details'); applyFieldHighlights(); }
    else if (['a2','a3'].includes(hash)) { switchBuilderTab('basic'); applyFieldHighlights(); }
  }
});

  const hash = location.hash.slice(1).toLowerCase();
  const ep2States = ['a1','a2','a3','a4','a5','a6','b1','b2','b3','b4','c1','c2','c3','c4'];
  ep2State = ep2States.includes(hash) ? hash : 'a1';
  refreshPubPanel();
  if (['a2','a3'].includes(ep2State)) applyFieldHighlights();
  if (ep2State === 'a5') { switchBuilderTab('details'); applyFieldHighlights(); }
});
