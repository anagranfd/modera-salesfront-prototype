<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>EP3 — Inventory Pipeline · Batch Publishing — Modera Salesfront</title>
<link rel="stylesheet" href="shared/tokens.css">
<link rel="stylesheet" href="shared/components.css">
<link rel="stylesheet" href="shared/animations.css">
<style>
html, body { height: 100%; overflow: hidden; }
.page-wrap { display: flex; flex-direction: column; height: 100vh; }
.toolbar {
  background: linear-gradient(180deg, #eef6fb, #e4eef5);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 6px 10px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.main-layout { flex: 1; display: flex; min-height: 0; }
.table-area { flex: 1; overflow: auto; padding: 10px 12px 60px; background: var(--page-bg); }

.inv-row .row-actions { display: flex; gap: 4px; }
.inv-row--selected td { background: #d4eaf8 !important; }
.inv-row--selected td:first-child { border-left: 3px solid #3a9ec8; }

/* Advanced Filter sidebar */
.right-sidebar {
  width: 210px;
  flex-shrink: 0;
  background: #eaf2f8;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.sidebar-hdr {
  background: linear-gradient(180deg, #ddeef7, #c8dce8);
  padding: 6px 9px;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}
.sidebar-search { padding: 5px 7px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-search input {
  width: 100%;
  border: 1px solid var(--border-dark);
  border-radius: 3px;
  padding: 3px 7px;
  font-size: 11px;
  outline: none;
  background: #fff;
  font-family: inherit;
  color: var(--text-main);
}
.model-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 8px;
  cursor: pointer;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  font-size: 11px;
}
.model-item:hover { background: rgba(255,255,255,0.6); }
.model-item.active { background: rgba(90,174,208,0.15); border-left: 2px solid #5aaed0; }
.model-thumb {
  width: 32px; height: 20px;
  background: linear-gradient(135deg, #d0e8f4, #a8c8dc);
  border-radius: 2px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #4a8aa0;
}
.model-label { flex: 1; font-weight: 600; color: var(--text-main); }
.model-cnt { font-size: 10px; color: var(--text-muted); background: #dde8f0; padding: 1px 5px; border-radius: 8px; }
.sidebar-status-section { padding: 8px; border-top: 1px solid var(--border); margin-top: auto; flex-shrink: 0; }
.sidebar-status-hdr { font-size: 10.5px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px; }
.sidebar-status-row { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); padding: 2px 0; }
.sidebar-status-cnt { margin-left: auto; font-weight: 700; font-size: 11px; }
</style>
</head>
<body>

<div class="page-wrap">

  <!-- Top nav — exactly as in screens -->
  <div class="modera-topnav">
    <div class="modera-topnav__logo">MODERA</div>
    <div class="modera-topnav__module">Salesfront</div>
    <div class="modera-topnav__right">
      <span class="pub-status-pill pub-status-pill--idle">Publishing</span>
      <span class="topnav-icon">🔔</span>
      <span class="topnav-username">J. Tamm ▾</span>
    </div>
  </div>

  <!-- Sub nav — exactly as in screens -->
  <div class="modera-subnav">
    <a class="subnav-tab subnav-tab--active">Inventory</a>
    <a class="subnav-tab">Customers</a>
    <a class="subnav-tab">Deals</a>
  </div>

  <!-- Main layout: table + Advanced Filter sidebar -->
  <div class="main-layout">

    <!-- Table area — exactly as in screens -->
    <div class="table-area">
      <div class="toolbar">
        <span style="font-size:13px;font-weight:700;color:var(--text-main);">Inventory</span>
        <input type="text" style="border:1px solid var(--border);border-radius:3px;padding:3px 8px;font-size:11.5px;width:200px;" placeholder="Search…">
        <div style="flex:1;"></div>
        <button class="jq-btn jq-btn--primary" onclick="openBatchWizard()">Publish selected</button>
        <button class="jq-btn">+ Add vehicle</button>
      </div>

      <table class="inv-table" style="width:100%;" id="inv-table">
        <thead><tr>
          <th style="width:32px;"><input type="checkbox" class="jq-check" id="check-all" onchange="toggleAll(this)"></th>
          <th>Vehicle</th><th>Year</th><th>Reg. no.</th><th>Price</th><th>Mileage</th>
          <th>Channels</th><th>Status</th><th>Actions</th>
        </tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <!-- Advanced Filter sidebar -->
    <div class="right-sidebar">
      <div class="sidebar-hdr">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1 2.5h9M2.5 5.5h6M4 8.5h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        Advanced filter
      </div>
      <div class="sidebar-search">
        <input type="text" placeholder="Search model…">
      </div>
      <div id="model-filter"></div>
      <div class="sidebar-status-section">
        <div class="sidebar-status-hdr">Channel status</div>
        <div class="sidebar-status-row">
          <span class="ch-dot ch-dot--published"></span> Published
          <span class="sidebar-status-cnt" style="color:var(--status-pub);">31</span>
        </div>
        <div class="sidebar-status-row">
          <span class="ch-dot ch-dot--pending"></span> Pending
          <span class="sidebar-status-cnt" style="color:var(--status-pend);">12</span>
        </div>
        <div class="sidebar-status-row">
          <span class="ch-dot ch-dot--error"></span> Errors
          <span class="sidebar-status-cnt" style="color:var(--status-err);">7</span>
        </div>
        <div class="sidebar-status-row">
          <span class="ch-dot ch-dot--unpublished"></span> Not published
          <span class="sidebar-status-cnt" style="color:var(--status-unpub);">24</span>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Batch wizard container -->
<div id="batch-wizard-container"></div>

<!-- Batch action bar -->
<div class="batch-bar" id="batch-bar">
  <span class="batch-bar__count"><span id="batch-count">0</span> vehicles selected</span>
  <span class="batch-bar__deselect" onclick="clearAll()">✕ Deselect all</span>
  <span class="batch-bar__spacer"></span>
  <button class="jq-btn jq-btn--sm" onclick="clearAll()">Cancel</button>
  <button class="jq-btn jq-btn--sm jq-btn--primary" onclick="openBatchWizard()">Publish selected →</button>
</div>

<script src="shared/icons.js"></script>
<script src="shared/batch-flow.js"></script>
<script>
const VEHICLES = [
  { id:'v1', make:'Volkswagen', model:'Golf 1.6 TDI',    year:2019, reg:'ABC-123', price:'€14,500', km:'78,200', status:'err',   ch:['err','pub','pub','unpub','err']   },
  { id:'v2', make:'Toyota',     model:'RAV4 2.0 CVT',    year:2021, reg:'XYZ-789', price:'€28,900', km:'32,100', status:'unpub', ch:['unpub','unpub','unpub','unpub','unpub'] },
  { id:'v3', make:'BMW',        model:'320d xDrive',     year:2020, reg:'BMW-555', price:'€31,200', km:'55,400', status:'pub',   ch:['pub','pub','pub','pub','pub']     },
  { id:'v4', make:'Audi',       model:'A4 2.0 TFSI',     year:2018, reg:'AUD-111', price:'€22,800', km:'95,000', status:'pend',  ch:['pub','pend','unpub','pub','unpub'] },
  { id:'v5', make:'Skoda',      model:'Octavia 1.5 TSI', year:2022, reg:'SKO-222', price:'€19,900', km:'18,500', status:'unpub', ch:['unpub','unpub','unpub','unpub','unpub'] },
];

const MODELS = [
  { make:'Volkswagen', count:12 },
  { make:'Toyota',     count:8  },
  { make:'BMW',        count:11 },
  { make:'Mercedes',   count:9  },
  { make:'Audi',       count:7  },
  { make:'Skoda',      count:6  },
];

const CAR_SVG = `<svg width="20" height="13" viewBox="0 0 20 13" fill="none"><path d="M2 9L3.5 5L6 4L14 4L16.5 5L18 9L18 11L2 11Z" stroke="currentColor" stroke-width="1" fill="none"/><circle cx="5.5" cy="11" r="1.8" fill="currentColor"/><circle cx="14.5" cy="11" r="1.8" fill="currentColor"/></svg>`;

const STATUS_MAP = {
  pub:   ['status-badge--pub',   'Published'],
  pend:  ['status-badge--pend',  'Pending'],
  err:   ['status-badge--err',   'Error'],
  unpub: ['status-badge--unpub', 'Unpublished'],
};
const CH_CLS = { pub:'published', pend:'pending', err:'error', unpub:'unpublished' };

let selected = new Set();

function renderTable() {
  document.getElementById('table-body').innerHTML = VEHICLES.map(v => {
    const [badgeCls, badgeLabel] = STATUS_MAP[v.status] || STATUS_MAP.unpub;
    const dots = v.ch.map(c => `<span class="ch-dot ch-dot--${CH_CLS[c]}"></span>`).join(' ');
    const isSel = selected.has(v.id);
    const actionBtn = v.status === 'err'
      ? `<button class="jq-btn jq-btn--sm jq-btn--red" onclick="openSingle('${v.id}')">Fix errors</button>`
      : `<button class="jq-btn jq-btn--sm jq-btn--primary" onclick="openSingle('${v.id}')">Publish</button>`;
    return `<tr class="inv-row${isSel ? ' inv-row--selected' : ''}" id="row-${v.id}">
      <td><input type="checkbox" class="jq-check"${isSel ? ' checked' : ''} onchange="toggleRow('${v.id}',this)"></td>
      <td style="font-weight:600;">${v.make} ${v.model}</td>
      <td>${v.year}</td>
      <td style="color:var(--text-muted);">${v.reg}</td>
      <td style="font-weight:600;">${v.price}</td>
      <td style="color:var(--text-muted);">${v.km} km</td>
      <td>${dots}</td>
      <td><span class="status-badge ${badgeCls}">${badgeLabel}</span></td>
      <td><div class="row-actions">${actionBtn}</div></td>
    </tr>`;
  }).join('');
}

function renderModelFilter() {
  document.getElementById('model-filter').innerHTML = MODELS.map((m, i) =>
    `<div class="model-item${i === 0 ? ' active' : ''}" onclick="this.parentNode.querySelectorAll('.model-item').forEach(x=>x.classList.remove('active'));this.classList.add('active');">
      <div class="model-thumb">${CAR_SVG}</div>
      <span class="model-label">${m.make}</span>
      <span class="model-cnt">${m.count}</span>
    </div>`
  ).join('');
}

window.toggleRow = function(id, cb) {
  if (cb.checked) selected.add(id); else selected.delete(id);
  const row = document.getElementById('row-' + id);
  if (row) row.className = 'inv-row' + (selected.has(id) ? ' inv-row--selected' : '');
  updateSelUI();
};

window.toggleAll = function(cb) {
  VEHICLES.forEach(v => cb.checked ? selected.add(v.id) : selected.delete(v.id));
  renderTable(); updateSelUI();
};

window.clearAll = function() {
  selected.clear();
  const ca = document.getElementById('check-all');
  if (ca) ca.checked = false;
  renderTable(); updateSelUI();
};

function updateSelUI() {
  const n = selected.size;
  const bb = document.getElementById('batch-bar');
  const bc = document.getElementById('batch-count');
  if (bc) bc.textContent = n;
  if (bb) bb.className = 'batch-bar' + (n > 0 ? ' batch-bar--visible' : '');
}

window.openSingle = function(id) {
  const v = VEHICLES.find(x => x.id === id);
  if (!v) return;
  const chRows = BATCH_CHANNELS.map((ch, i) => {
    const st = v.ch[i] || 'unpub';
    return `<div class="ch-row">
      <span class="ch-dot ch-dot--${CH_CLS[st]}"></span>
      <div><div class="ch-name">${ch.name}</div></div>
      <button class="jq-btn jq-btn--xs jq-btn--primary">Publish</button>
    </div>`;
  }).join('');
  document.getElementById('batch-wizard-container').innerHTML = `
    <div class="pub-backdrop">
      <div class="pub-dialog" style="min-width:420px;">
        <div class="pub-dialog__header">
          <div class="pub-dialog__title">${v.make} ${v.model} · ${v.reg}</div>
          <button class="pub-dialog__close" onclick="document.getElementById('batch-wizard-container').innerHTML=''">✕</button>
        </div>
        <div class="pub-dialog__body">${chRows}</div>
        <div class="pub-dialog__footer">
          <button class="jq-btn" onclick="document.getElementById('batch-wizard-container').innerHTML=''">Close</button>
          <button class="jq-btn jq-btn--primary">Publish all channels</button>
        </div>
      </div>
    </div>`;
};

const _orig = window.openBatchWizard;
window.openBatchWizard = function() {
  if (selected.size === 0) return;
  if (_orig) _orig();
};

window.addEventListener('load', () => {
  renderTable();
  renderModelFilter();
  const hash = location.hash.slice(1).toLowerCase();
  if (['b2','b3','b3a','b4','b5','b6','b7'].includes(hash)) {
    ['v1','v2','v3','v4'].forEach(id => selected.add(id));
    updateSelUI(); renderTable();
    renderBatchStep(hash);
  }
});

window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1).toLowerCase();
  document.getElementById('batch-wizard-container').innerHTML = '';
  if (['b2','b3','b3a','b4','b5','b6','b7'].includes(hash)) renderBatchStep(hash);
});
</script>
</body>
</html>
